services:
  app:
    build: .
    ports:
      - "3001:3001"
    volumes:
      - ./data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3001
      - SESSION_SECRET=change-me-to-something-secure
      # - APP_NAME=myapp
      # - MCP_SERVER_URL=https://mcp.example.com
    restart: unless-stopped
